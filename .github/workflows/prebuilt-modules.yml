name: prebuilt-modules

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            library: libnucleo_completion_module.so
          - os: macos-15-intel
            target: x86_64-apple-darwin
            library: libnucleo_completion_module.dylib
          - os: macos-15
            target: aarch64-apple-darwin
            library: libnucleo_completion_module.dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            library: nucleo_completion_module.dll

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build module
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage module
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/bin/${{ matrix.target }}
          cp target/${{ matrix.target }}/release/${{ matrix.library }} \
            dist/bin/${{ matrix.target }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nucleo-completion-${{ matrix.target }}
          path: dist

  commit-prebuilt-modules:
    name: commit-prebuilt-modules
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download prebuilt artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nucleo-completion-*
          path: artifacts
          merge-multiple: true

      - name: Commit modules to main
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bin
          cp -R artifacts/bin/. bin/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bin
          if git diff --cached --quiet; then
            echo "No prebuilt module changes."
            exit 0
          fi
          git commit -m "Update prebuilt modules"
          git push
