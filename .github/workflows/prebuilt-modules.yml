name: prebuilt-modules

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub Release tag to upload assets to, for example v0.1.9
        required: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            library: libnucleo_completion_module.so
            extension: so
          - os: macos-15-intel
            target: x86_64-apple-darwin
            library: libnucleo_completion_module.dylib
            extension: dylib
          - os: macos-15
            target: aarch64-apple-darwin
            library: libnucleo_completion_module.dylib
            extension: dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            library: nucleo_completion_module.dll
            extension: dll

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build module
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage module
        shell: bash
        run: |
          set -euo pipefail
          asset="nucleo-completion-module-${{ matrix.target }}.${{ matrix.extension }}"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.library }} \
            "dist/${asset}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${asset}" > "dist/${asset}.sha256"
          else
            shasum -a 256 "dist/${asset}" > "dist/${asset}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nucleo-completion-${{ matrix.target }}
          path: dist/*

  publish-release-assets:
    name: publish-release-assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download prebuilt artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nucleo-completion-*
          path: artifacts
          merge-multiple: true

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "$tag" \
              --notes "Prebuilt nucleo-completion dynamic modules for $tag."
          fi
          gh release upload "$tag" artifacts/* --clobber
