name: prebuilt-modules

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub Release tag to upload assets to, for example v0.1.14
        required: true

jobs:
  validate-release:
    name: validate-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Validate release version
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          pkgid="$(cargo pkgid --package nucleo-completion-module)"
          version="${pkgid##*@}"
          if [[ -z "$version" || "$version" == "$pkgid" ]]; then
            echo "Could not determine package version from ${pkgid}" >&2
            exit 1
          fi
          expected_tag="v${version}"
          if [[ "$RELEASE_TAG" != "$expected_tag" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match package version ${version}" >&2
            exit 1
          fi
          grep -F ";; Version: ${version}" nucleo-completion.el >/dev/null
          grep -F "(defconst nucleo-completion-required-module-version \"${version}\"" \
            nucleo-completion.el >/dev/null

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Install Emacs
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox

      - name: Build Rust module
        run: cargo build --release

      - name: Test Rust module
        run: cargo test --release

      - name: Lint Rust module
        run: cargo clippy --all-targets -- -D warnings

      - name: Byte compile Elisp
        run: emacs -Q --batch -L . -L target/release --eval '(setq byte-compile-error-on-warn t)' --eval '(byte-compile-file "nucleo-completion.el")'

      - name: Check Elisp documentation
        run: emacs -Q --batch -L . --eval '(progn (require (quote checkdoc)) (unless (checkdoc-file "nucleo-completion.el") (kill-emacs 1)))'

      - name: Check Elisp declarations
        run: emacs -Q --batch -L . --eval '(when (check-declare-file "nucleo-completion.el") (kill-emacs 1))'

      - name: Run ERT
        run: emacs -Q --batch -L . -L target/release -L test -l test/nucleo-completion-tests.el -f ert-run-tests-batch-and-exit

  build:
    name: ${{ matrix.target }}
    needs: validate-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            library: libnucleo_completion_module.so
            extension: so
          - os: macos-15-intel
            target: x86_64-apple-darwin
            library: libnucleo_completion_module.dylib
            extension: dylib
          - os: macos-15
            target: aarch64-apple-darwin
            library: libnucleo_completion_module.dylib
            extension: dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            library: nucleo_completion_module.dll
            extension: dll

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build module
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage module
        shell: bash
        run: |
          set -euo pipefail
          asset="nucleo-completion-module-${{ matrix.target }}.${{ matrix.extension }}"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.library }} \
            "dist/${asset}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${asset}" > "dist/${asset}.sha256"
          else
            shasum -a 256 "dist/${asset}" > "dist/${asset}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nucleo-completion-${{ matrix.target }}
          path: dist/*

  publish-release-assets:
    name: publish-release-assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download prebuilt artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nucleo-completion-*
          path: artifacts
          merge-multiple: true

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "$tag" \
              --notes "Prebuilt nucleo-completion dynamic modules for $tag."
          fi
          gh release upload "$tag" artifacts/* --clobber
